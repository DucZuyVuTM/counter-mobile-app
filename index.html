<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      /* This style loads right before Wasm */
      body {
        margin: 0;
        background-color: #f3f4f6;
        overflow: hidden;
      }

      #main {
        visibility: hidden;
      }

      #splash {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-color: #f3f4f6;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #splash-spinner {
        width: 48px; height: 48px;
        border: 5px solid #d1d5db;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Splash is immediately displayed, before Wasm loading -->
    <div id="splash">
      <div id="splash-spinner"></div>
    </div>

    <div id="main"></div>
  </body>
</html>
