name: Build Release APK

on:
  push:
    branches:
      - "main"
    tags:
      - 'v*'

jobs:
  build-android:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli

      - name: Build Android APK
        run: dx build --platform android --release --target aarch64-linux-android

      - name: Prepare APK
        run: |
          mkdir -p final_apk
          find target/dx/${{ github.event.repository.name }}/release/android -name "*.apk" | head -n 1 | xargs -I {} cp {} final_apk/${{ github.event.repository.name }}-release.apk

          echo "Found files in final_apk:"
          ls -l final_apk

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: final_apk
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename APK
        run: |
          cp ${{ steps.sign_app.outputs.signedReleaseFile }} ${{ github.event.repository.name }}-${{ github.ref_name }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-release
          path: ${{ github.event.repository.name }}-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')  # Only runs when tag created
        with:
          files: ${{ github.event.repository.name }}-${{ github.ref_name }}.apk
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: "Automatic release for version ${{ github.ref_name }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
